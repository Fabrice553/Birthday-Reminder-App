<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Birthday Reminder App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.5s ease-out;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease-out;
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            flex: 0 1 auto;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .birthday-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .birthday-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .birthday-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .birthday-info p {
            color: #666;
            font-size: 0.9em;
        }

        .birthday-badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            padding: 8px 15px;
            font-size: 0.9em;
            width: auto;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .cron-status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 8px;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .cron-status.error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎂 Birthday Reminder</h1>
            <p>Never forget a birthday again!</p>
        </header>

        <div class="main-content">
            <!-- Form Section -->
            <div class="card">
                <h2>➕ Add Birthday</h2>
                <div id="formMessage" class="message"></div>
                
                <form id="birthdayForm">
                    <div class="form-group">
                        <label for="username">Name *</label>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Enter name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="Enter email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth *</label>
                        <input 
                            type="date" 
                            id="dateOfBirth"
                            required
                        >
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">Add Birthday</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>

            <!-- Birthdays Section -->
            <div class="card">
                <h2>🎉 Birthday List</h2>
                
                <div class="stats">
                    <div class="stat-box">
                        <h3 id="totalCount">0</h3>
                        <p>Total Birthdays</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="todayCount">0</h3>
                        <p>Today</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="upcomingCount">0</h3>
                        <p>This Month</p>
                    </div>
                </div>

                <div id="cronStatus" class="cron-status" style="display: none;"></div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Loading birthdays...</p>
                </div>

                <div id="birthdaysList" class="birthday-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No birthdays yet. Add one to get started!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="card">
            <h2>⚙️ Actions</h2>
            <div class="button-group">
                <button id="sendRemindersBtn" class="btn-primary">📧 Send Birthday Reminders Now</button>
                <button id="refreshBtn" class="btn-secondary">🔄 Refresh List</button>
            </div>
            <div id="actionMessage" class="message" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        // Form submission
        document.getElementById('birthdayForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formMessage = document.getElementById('formMessage');
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const dateOfBirth = document.getElementById('dateOfBirth').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/birthdays`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        dateOfBirth
                    })
                });

                const data = await response.json();

                if (data.success) {
                    formMessage.className = 'message success';
                    formMessage.textContent = '✅ ' + data.message;
                    document.getElementById('birthdayForm').reset();
                    loadBirthdays();
                    setTimeout(() => formMessage.style.display = 'none', 3000);
                } else {
                    formMessage.className = 'message error';
                    formMessage.textContent = '❌ ' + data.message;
                }
            } catch (error) {
                formMessage.className = 'message error';
                formMessage.textContent = '❌ Error: ' + error.message;
            }
        });

        // Load birthdays
        async function loadBirthdays() {
            const loading = document.getElementById('loading');
            const birthdaysList = document.getElementById('birthdaysList');
            
            loading.style.display = 'block';
            birthdaysList.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE_URL}/api/birthdays`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    document.getElementById('totalCount').textContent = data.count;
                    
                    let todayCount = 0;
                    const today = new Date();
                    const currentMonth = today.getMonth() + 1;

                    birthdaysList.innerHTML = data.data.map(birthday => {
                        const birthDate = new Date(birthday.dateOfBirth);
                        const birthMonth = birthDate.getMonth() + 1;
                        
                        if (birthday.month === today.getMonth() + 1 && birthday.day === today.getDate()) {
                            todayCount++;
                        }

                        return `
                            <div class="birthday-item">
                                <div class="birthday-info">
                                    <h3>🎂 ${birthday.username}</h3>
                                    <p>📧 ${birthday.email}</p>
                                    <p>📅 ${formatDate(birthday.dateOfBirth)} (Age: ${calculateAge(birthday.dateOfBirth)})</p>
                                </div>
                                <div>
                                    <div class="birthday-badge" style="margin-bottom: 10px;">
                                        ${birthday.month}/${birthday.day}
                                    </div>
                                    <div class="action-buttons">
                                        <button class="btn-danger" onclick="deleteBirthday('${birthday._id}')">🗑️ Delete</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('todayCount').textContent = todayCount;
                } else {
                    birthdaysList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No birthdays yet. Add one to get started!</p>
                        </div>
                    `;
                    document.getElementById('totalCount').textContent = '0';
                    document.getElementById('todayCount').textContent = '0';
                }

                // Load cron status
                loadCronStatus();
            } catch (error) {
                console.error('Error loading birthdays:', error);
                birthdaysList.innerHTML = `
                    <div class="empty-state" style="color: red;">
                        <p>❌ Error loading birthdays</p>
                    </div>
                `;
            } finally {
                loading.style.display = 'none';
            }
        }

        // Load cron status
        async function loadCronStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/webhooks/cron/status`);
                const data = await response.json();

                const cronStatus = document.getElementById('cronStatus');
                if (data.success && data.data.running) {
                    const nextDate = new Date(data.data.nextDate);
                    cronStatus.className = 'cron-status';
                    cronStatus.innerHTML = `✅ Cron job is running. Next check: ${nextDate.toLocaleString()}`;
                    cronStatus.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading cron status:', error);
            }
        }

        // Delete birthday
        async function deleteBirthday(id) {
            if (!confirm('Are you sure you want to delete this birthday?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/birthdays/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    loadBirthdays();
                } else {
                    alert('Error deleting birthday');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Send reminders
        document.getElementById('sendRemindersBtn').addEventListener('click', async () => {
            const actionMessage = document.getElementById('actionMessage');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/birthdays/trigger/reminders`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    actionMessage.className = 'message success';
                    actionMessage.textContent = `✅ ${data.message} (${data.count.success} sent, ${data.count.failed} failed)`;
                } else {
                    actionMessage.className = 'message error';
                    actionMessage.textContent = '❌ ' + data.message;
                }
                
                loadBirthdays();
            } catch (error) {
                actionMessage.className = 'message error';
                actionMessage.textContent = '❌ Error: ' + error.message;
            }
        });

        // Refresh button
        document.getElementById('refreshBtn').addEventListener('click', loadBirthdays);

        // Utility functions
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function calculateAge(dateOfBirth) {
            const today = new Date();
            const birthDate = new Date(dateOfBirth);
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        // Load birthdays on page load
        loadBirthdays();
        setInterval(loadBirthdays, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
